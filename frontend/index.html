    <!-- Structured Data: FAQPage (server-rendered — covers most-asked questions for AI Overviews) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How much does social media management cost at Shyara Marketing?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Shyara Marketing offers three social media management plans: Starter at Rs. 7,999/month (4 reels + 8 image creatives), Growth at Rs. 14,999/month (8 reels + 12 creatives + ad planning), and Scale at Rs. 20,000/month (12 reels + 16 creatives + AI business insights). All plans include Google Business Profile optimization and engagement management. A 3-month minimum commitment is required; billing continues monthly after that."
          }
        },
        {
          "@type": "Question",
          "name": "What is Shyara Marketing's fee for managing ad campaigns?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Shyara Marketing charges a transparent 20% management fee of the monthly ad budget. The minimum recommended ad budget is Rs. 5,000/month. There are no hidden markups on ad spend — clients always retain full ownership of their ad accounts. Free static image creatives are included in the management fee."
          }
        },
        {
          "@type": "Question",
          "name": "How long does it take to build a website with Shyara Marketing?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A basic business website (portfolio, local business, consultant site) typically takes 3–5 business days. An e-commerce or booking website takes 2–3 weeks. Custom websites (marketplaces, LMS, healthcare portals) are scoped per project. All websites include two revision rounds and full ownership is transferred on delivery."
          }
        },
        {
          "@type": "Question",
          "name": "Is there a contract for social media management at Shyara Marketing?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Social media management is offered on a 3-month contract. Social media growth depends on consistency — regular posting and engagement build results over time, not overnight. The 3-month period ensures enough runway to build content rhythm, grow the audience, and deliver measurable results. A written scope document with deliverables, timeline, and pricing is provided before any payment is required."
          }
        },
        {
          "@type": "Question",
          "name": "Do clients own the website, app, or ad account that Shyara Marketing builds?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Clients receive full ownership of all deliverables: website source code, app source code, ad accounts, social media assets, and brand materials. Shyara Marketing transfers complete ownership on delivery — there are no ongoing dependency fees or platform lock-ins."
          }
        }
      ]
    }
    </script>
